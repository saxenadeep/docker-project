name: Django Deployment

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/django-project
            git pull origin master
            source venv/bin/activate
            pip install -r requirements.txt
            python3 manage.py migrate
            # Gunicorn को रीस्टार्ट करने के लिए:
            ps aux | grep manage.py | grep -v grep | awk '{print $2}' | xargs kill -9 || echo "No process running"
            nohup python3 manage.py runserver 0.0.0.0:8000 > /dev/null 2>&1 &
